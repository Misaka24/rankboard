name: Release RankBoard 1.5.7 period fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  release:
    if: github.head_ref == 'fix-partial-periods-1.5.7-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Patch, build and publish RankBoard 1.5.7
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 tools/fix_release_validator_1_5_7.py
          bash tools/release_1_5_7.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rankboard-1.5.7-release
          path: release-1.5.7/
