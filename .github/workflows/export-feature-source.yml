name: Export clean feature source

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/export-feature-source-trigger'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: b9dfdc6e1d079bfc5fd5be0de6515555fc858993
          fetch-depth: 1
      - name: Package source
        run: tar --exclude=.git -czf rankboard-feature-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: rankboard-feature-source-b9dfdc6
          path: rankboard-feature-source.tar.gz
