name: Publish RankBoard 1.5.5 Multi-Version

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/release-1.5.5-trigger'

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  publish:
    if: github.repository == 'Misaka24/rankboard'
    runs-on: ubuntu-latest
    steps:
      - name: Check out clean feature commit
        uses: actions/checkout@v4
        with:
          ref: b9dfdc6e1d079bfc5fd5be0de6515555fc858993
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Verify upstream 1.5.4 release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api repos/halfkite/rankboard/releases/tags/1.5.4 > upstream-release.json
          test "$(jq -r .tag_name upstream-release.json)" = "1.5.4"
          tag_sha="$(gh api repos/halfkite/rankboard/git/ref/tags/1.5.4 --jq .object.sha)"
          test "$tag_sha" = "bcbd544c86635b59fcaa3b6f5c05f3f67f64d548"
          jq '{tag_name,name,published_at,target_commitish,assets:[.assets[].name]}' upstream-release.json

      - name: Prepare release version
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/^mod_version=.*/mod_version=1.5.5/' gradle.properties
          sed -i 's/当前版本：`1\.5\.2`/当前版本：`1.5.5`/' README.md
          sed -i 's/Current version: `1\.5\.2`/Current version: `1.5.5`/' README.md
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git checkout -B release-1.5.5
          git add gradle.properties README.md
          git commit -m 'Release RankBoard 1.5.5'
          git push --force origin release-1.5.5
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Build three release targets
        id: build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files wrapper/META-INF/jars wrapper-root

          build_121() {
            local name="$1" mc="$2" mappings="$3" fabric="$4" range="$5"
            ./gradlew clean build --no-daemon --stacktrace \
              -Pminecraft_version="$mc" -Pmapping_type=yarn \
              -Pyarn_mappings="$mappings" -Pminecraft_dependency="$range" \
              -Ploader_version=0.15.11 -Pfabric_version="$fabric" \
              -Pmod_version=1.5.5
            local jar
            jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
            test -n "$jar"
            cp "$jar" "wrapper/META-INF/jars/rankboard-mc${name}-1.5.5.jar"
          }

          build_121 '1.21' '1.21' '1.21+build.9' '0.102.0+1.21' '>=1.21 <1.21.5'
          build_121 '1.21.5' '1.21.5' '1.21.5+build.1' '0.128.2+1.21.5' '>=1.21.5 <1.21.10'
          build_121 '1.21.10' '1.21.10' '1.21.10+build.3' '0.138.4+1.21.10' '>=1.21.10 <1.21.11'
          build_121 '1.21.11' '1.21.11' '1.21.11+build.6' '0.141.5+1.21.11' '>=1.21.11 <1.22'

          cp LICENSE wrapper-root/LICENSE
          cp -r wrapper/META-INF wrapper-root/META-INF
          python - <<'PY'
          import json, os, zipfile
          root='wrapper-root'
          manifest={
            'schemaVersion':1,'id':'rankboard_wrapper','version':'1.5.5+mc1.21.x',
            'name':'RankBoard 1.21.x Wrapper',
            'description':'Selects the compatible RankBoard build for Minecraft 1.21.x.',
            'environment':'*','entrypoints':{},
            'depends':{'fabricloader':'>=0.15.11','minecraft':'>=1.21 <1.22','java':'>=21'},
            'jars':[{'file':f'META-INF/jars/rankboard-mc{v}-1.5.5.jar'} for v in ('1.21','1.21.5','1.21.10','1.21.11')]
          }
          with open(os.path.join(root,'fabric.mod.json'),'w',encoding='utf-8') as f:
              json.dump(manifest,f,ensure_ascii=False,indent=2)
          out='release-files/rankboard-1.5.5+mc1.21.x.jar'
          with zipfile.ZipFile(out,'w',zipfile.ZIP_DEFLATED) as z:
              for base,_,files in os.walk(root):
                  for name in files:
                      p=os.path.join(base,name)
                      z.write(p,os.path.relpath(p,root).replace(os.sep,'/'))
          PY

          get_fabric_api() {
            python - "$1" <<'PY'
          import sys, urllib.request, xml.etree.ElementTree as ET
          target='+'+sys.argv[1]
          root=ET.fromstring(urllib.request.urlopen('https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/maven-metadata.xml').read())
          versions=[e.text for e in root.findall('.//version') if e.text and e.text.endswith(target)]
          if not versions: raise SystemExit('No Fabric API version found for '+sys.argv[1])
          print(versions[-1])
          PY
          }

          build_26() {
            local mc="$1" range="$2" label="$3" fabric
            fabric="$(get_fabric_api "$mc")"
            ./gradlew clean build --no-daemon --stacktrace \
              -Pminecraft_version="$mc" -Pmapping_type=none \
              -Pminecraft_dependency="$range" -Ploader_version=0.18.6 \
              -Pfabric_version="$fabric" -Pmod_version=1.5.5
            local jar
            jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
            test -n "$jar"
            cp "$jar" "release-files/rankboard-1.5.5+mc${label}.jar"
          }

          build_26 '26.1.2' '>=26.1 <26.2' '26.1.x'
          build_26 '26.2' '>=26.2 <26.3' '26.2.x'

          python - <<'PY'
          import os, zipfile
          for fn in os.listdir('release-files'):
              if not fn.endswith('.jar'): continue
              p=os.path.join('release-files',fn)
              with zipfile.ZipFile(p) as z:
                  names=z.namelist()
                  if fn.endswith('mc1.21.x.jar'):
                      assert len([n for n in names if n.startswith('META-INF/jars/') and n.endswith('.jar')]) == 4
          PY
          (cd release-files && sha256sum *.jar > SHA256SUMS.txt)
          ls -lh release-files

      - name: Upload Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: rankboard-1.5.5-three-minecraft-targets
          path: release-files/*
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete 1.5.5 --yes --cleanup-tag || true
          gh release create 1.5.5 release-files/* \
            --target "$RELEASE_SHA" \
            --title 'RankBoard 1.5.5' \
            --notes $'## RankBoard 1.5.5\n\nBased on upstream release `1.5.4` and includes the damage dealt leaderboard (`dealt`).\n\nMinecraft targets:\n- 1.21.x universal wrapper (1.21, 1.21.5, 1.21.10, 1.21.11)\n- 26.1.x (built against 26.1.2)\n- 26.2.x (built against 26.2)\n\nIncludes online/offline damage-dealt statistics, web UI integration, labels, colors and cache migration.'

      - name: Delete old Actions runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" --jq '.workflow_runs[].id' |
          while read -r run_id; do
            [ "$run_id" = "$GITHUB_RUN_ID" ] || gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" || true
          done

      - name: Delete temporary branches
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/release-1.5.5-trigger" || true
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/release-1.5.5" || true
