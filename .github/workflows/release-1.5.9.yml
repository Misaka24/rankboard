name: Release RankBoard 1.5.9 PvP menu fix

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write

jobs:
  release:
    if: github.head_ref == 'fix-pvp-menu-1.5.9-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Patch, build and publish RankBoard 1.5.9
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash tools/release_1_5_9.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rankboard-1.5.9-release
          path: release-1.5.9/
