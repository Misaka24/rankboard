name: Validate RankBoard 1.5.6 Mojmap

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: mc26.1.2
            minecraft: 26.1.2
          - id: mc26.2
            minecraft: 26.2
    runs-on: ubuntu-latest
    name: build-${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve official Fabric dependency
        env:
          MC: ${{ matrix.minecraft }}
        run: |
          python3 <<'PY'
          import os
          import urllib.request
          import xml.etree.ElementTree as ET
          from pathlib import Path

          mc = os.environ['MC']
          metadata = urllib.request.urlopen(
              'https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/maven-metadata.xml',
              timeout=30,
          ).read()
          versions = [node.text for node in ET.fromstring(metadata).findall('.//version')]
          fabric = [version for version in versions if version.endswith('+' + mc)]
          if not fabric:
              raise SystemExit('No Fabric API found for ' + mc)
          fabric_version = fabric[-1]

          path = Path('gradle.properties')
          lines = []
          found = False
          for line in path.read_text(encoding='utf-8').splitlines():
              if line.startswith('minecraft_version='):
                  line = 'minecraft_version=' + mc
              elif line.startswith('loader_version='):
                  line = 'loader_version=0.18.6'
              elif line.startswith('fabric_version='):
                  line = 'fabric_version=' + fabric_version
              elif line.startswith('mapping_type='):
                  found = True
                  line = 'mapping_type=none'
              lines.append(line)
          if not found:
              lines.append('mapping_type=none')
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('minecraft=' + mc)
          print('fabric=' + fabric_version)
          print('mapping_type=none')
          PY
          cat gradle.properties
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew clean build --stacktrace 2>&1 | tee build-${{ matrix.id }}.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-${{ matrix.id }}-r2
          path: |
            build-${{ matrix.id }}.log
            build/libs/*.jar
