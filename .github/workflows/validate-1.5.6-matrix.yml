name: Validate RankBoard 1.5.6 matrix

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: mc1.21.1
            minecraft: 1.21.1
            mappings: yarn
          - id: mc1.21.5
            minecraft: 1.21.5
            mappings: yarn
          - id: mc1.21.10
            minecraft: 1.21.10
            mappings: yarn
          - id: mc1.21.11
            minecraft: 1.21.11
            mappings: yarn
          - id: mc26.1.2
            minecraft: 26.1.2
            mappings: official
          - id: mc26.2
            minecraft: 26.2
            mappings: official
    runs-on: ubuntu-latest
    name: build-${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve official Fabric dependencies
        env:
          MC: ${{ matrix.minecraft }}
          MAPPINGS: ${{ matrix.mappings }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request
          import xml.etree.ElementTree as ET
          from pathlib import Path

          mc = os.environ['MC']
          mappings = os.environ['MAPPINGS']
          metadata = urllib.request.urlopen(
              'https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/maven-metadata.xml',
              timeout=30,
          ).read()
          versions = [node.text for node in ET.fromstring(metadata).findall('.//version')]
          fabric = [version for version in versions if version.endswith('+' + mc)]
          if not fabric:
              raise SystemExit('No Fabric API found for ' + mc)
          fabric_version = fabric[-1]

          yarn_version = None
          if mappings == 'yarn':
              data = json.load(urllib.request.urlopen(
                  f'https://meta.fabricmc.net/v2/versions/yarn/{mc}', timeout=30))
              stable = [entry['version'] for entry in data if entry.get('stable')]
              candidates = stable or [entry['version'] for entry in data]
              if not candidates:
                  raise SystemExit('No Yarn mappings found for ' + mc)
              yarn_version = candidates[0]

          path = Path('gradle.properties')
          lines = []
          seen_mapping_type = False
          for line in path.read_text(encoding='utf-8').splitlines():
              if line.startswith('minecraft_version='):
                  line = 'minecraft_version=' + mc
              elif line.startswith('yarn_mappings=') and yarn_version:
                  line = 'yarn_mappings=' + yarn_version
              elif line.startswith('loader_version='):
                  line = 'loader_version=0.18.6'
              elif line.startswith('fabric_version='):
                  line = 'fabric_version=' + fabric_version
              elif line.startswith('mapping_type='):
                  seen_mapping_type = True
                  line = 'mapping_type=' + ('official' if mappings == 'official' else 'yarn')
              lines.append(line)
          if not seen_mapping_type:
              lines.append('mapping_type=' + ('official' if mappings == 'official' else 'yarn'))
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('minecraft=' + mc)
          print('fabric=' + fabric_version)
          print('mappings=' + (yarn_version or 'official'))
          PY
          cat gradle.properties
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew clean build --stacktrace 2>&1 | tee build-${{ matrix.id }}.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-${{ matrix.id }}
          path: |
            build-${{ matrix.id }}.log
            build/libs/*.jar
