name: Apply RankBoard 1.5.6 data correctness fix

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write

jobs:
  apply-and-build:
    if: github.head_ref == 'fix-data-correctness-1.5.6'
    runs-on: ubuntu-latest
    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply data correctness patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, content):
              Path(path).write_text(content, encoding='utf-8')

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          def replace_regex(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one regex match, found {count}')
              return updated

          def patch_stat_reader(path, mojmap):
              text = read(path)
              if mojmap:
                  text = replace_once(text,
                      'import net.minecraft.world.item.BlockItem;\n',
                      'import net.minecraft.world.item.BlockItem;\nimport net.minecraft.world.level.block.Block;\n',
                      f'{path} block import')
                  player_type = 'ServerPlayer'
                  uuid_getter = 'getUUID()'
                  stats_path = 'server.getWorldPath(LevelResource.PLAYER_STATS_DIR)'
                  registry_block_loop = ('        for (Block block : BuiltInRegistries.BLOCK) {\n'
                                         '            BLOCK_IDS.add(BuiltInRegistries.BLOCK.getKey(block).toString());\n'
                                         '        }\n')
              else:
                  text = replace_once(text,
                      'import net.minecraft.item.BlockItem;\n',
                      'import net.minecraft.block.Block;\nimport net.minecraft.item.BlockItem;\n',
                      f'{path} block import')
                  player_type = 'ServerPlayerEntity'
                  uuid_getter = 'getUuid()'
                  stats_path = 'server.getSavePath(WorldSavePath.STATS)'
                  registry_block_loop = ('        for (Block block : Registries.BLOCK) {\n'
                                         '            BLOCK_IDS.add(Registries.BLOCK.getId(block).toString());\n'
                                         '        }\n')

              text = replace_once(text,
                  '    private static final Set<String> BLOCK_ITEMS = ConcurrentHashMap.newKeySet();\n',
                  '    private static final Set<String> BLOCK_ITEMS = ConcurrentHashMap.newKeySet();\n'
                  '    private static final Set<String> BLOCK_IDS = ConcurrentHashMap.newKeySet();\n',
                  f'{path} block ids field')
              text = replace_once(text, 'PERSISTENT_CACHE_SCHEMA = 4', 'PERSISTENT_CACHE_SCHEMA = 5', f'{path} cache schema')

              old_start = '''        persistentCacheLoaded = loadPersistentCache(server);\n        ready = persistentCacheLoaded;\n        if (persistentCacheLoaded) {\n            server.execute(() -> {\n                LeaderboardState.get(server).rollPeriods(server);\n                BoardService.refreshAll(server);\n            });\n        }\n        int filesPerSecond = RankBoardConfig.get().historyFilesPerSecond;'''
              new_start = '''        persistentCacheLoaded = loadPersistentCache(server);\n        // The persisted cache is only a startup preview. It must never establish\n        // period baselines or date snapshots before every stats file is verified.\n        int filesPerSecond = RankBoardConfig.get().historyFilesPerSecond;'''
              text = replace_once(text, old_start, new_start, f'{path} authoritative startup')

              capture = f'''    static void capturePlayer(MinecraftServer server, {player_type} player) {{\n        StatSnapshot snapshot = fromPlayer(player);\n        UUID uuid = player.{uuid_getter};\n        CACHE.put(uuid, snapshot);\n        Path path = {stats_path}.resolve(uuid + ".json");\n        SOURCE_MODIFIED.put(uuid, modifiedTime(path));\n        savePersistentCache(server);\n        WebDashboard.invalidateRankings();\n    }}\n\n'''
              text = replace_once(text,
                  '    static void reloadPlayer(MinecraftServer server, UUID uuid) {\n',
                  capture + '    static void reloadPlayer(MinecraftServer server, UUID uuid) {\n',
                  f'{path} capture player')

              method_pattern = r'(    static void reloadPlayer\(MinecraftServer server, UUID uuid\) \{.*?)(\n    \}\n\n    static void updateName)'
              match = re.search(method_pattern, text, flags=re.S)
              if not match:
                  raise SystemExit(f'{path}: reloadPlayer method not found')
              block = match.group(1)
              block = replace_once(block,
                  '                savePersistentCache(server);\n',
                  '                savePersistentCache(server);\n                WebDashboard.invalidateRankings();\n',
                  f'{path} reload invalidation')
              text = text[:match.start(1)] + block + text[match.end(1):]

              old_complete = '''            server.execute(() -> {\n                LeaderboardState.get(server).rollPeriods(server);\n                BoardService.refreshAll(server);\n            });'''
              new_complete = '''            server.execute(() -> {\n                LeaderboardState.get(server).rollPeriods(server);\n                BoardService.restoreGlobal(server);\n                BoardService.refreshAll(server);\n                WebDashboard.invalidateRankings();\n            });'''
              text = replace_once(text, old_complete, new_complete, f'{path} warmup completion')

              text = replace_once(text,
                  '        FOOD_ITEMS.clear();\n        BLOCK_ITEMS.clear();\n        REDSTONE_COMPONENT_ITEMS.clear();\n',
                  '        FOOD_ITEMS.clear();\n        BLOCK_ITEMS.clear();\n        BLOCK_IDS.clear();\n        REDSTONE_COMPONENT_ITEMS.clear();\n' + registry_block_loop,
                  f'{path} registry sets')
              text = replace_once(text,
                  '            case MINED -> sum(stats, "minecraft:mined");',
                  '            case MINED -> sumMatching(stats, "minecraft:mined", BLOCK_IDS);',
                  f'{path} mined normalization')
              write(path, text)

          def patch_state(path, mojmap):
              text = read(path)
              text = replace_once(text,
                  'import java.time.LocalDate;\n',
                  'import java.time.LocalDate;\nimport java.time.LocalTime;\n',
                  f'{path} LocalTime import')
              text = replace_once(text,
                  '    private static final String STATE_ID = "rankboard_leaderboard";\n',
                  '    private static final String STATE_ID = "rankboard_leaderboard";\n'
                  '    private static final int HISTORY_SCHEMA = 2;\n'
                  '    private static final LocalTime COMPLETE_BOUNDARY_LIMIT = LocalTime.of(0, 5);\n',
                  f'{path} history constants')
              text = replace_once(text,
                  '    private final NavigableMap<LocalDate, Map<UUID, Map<RankBoardMod.Metric, Long>>> dailySnapshots = new TreeMap<>();\n',
                  '    private final NavigableMap<LocalDate, Map<UUID, Map<RankBoardMod.Metric, Long>>> dailySnapshots = new TreeMap<>();\n'
                  '    private final Set<LocalDate> partialSnapshotDates = new HashSet<>();\n',
                  f'{path} partial snapshot field')

              tag = 'Tag' if mojmap else 'NbtElement'
              compound = 'CompoundTag' if mojmap else 'NbtCompound'
              compound_type = 'Tag.TAG_COMPOUND' if mojmap else 'NbtElement.COMPOUND_TYPE'
              string_type = 'Tag.TAG_STRING' if mojmap else 'NbtElement.STRING_TYPE'
              dirty = 'setDirty()' if mojmap else 'markDirty()'

              old_load = f'''        for ({tag} element : NbtCompat.getList(nbt, "periods", {compound_type})) {{\n            PeriodData data = PeriodData.fromNbt(({compound}) element);\n            state.periods.put(data.period, data);\n        }}\n        for ({tag} element : NbtCompat.getList(nbt, "dailySnapshots", {compound_type})) {{\n            {compound} snapshot = ({compound}) element;\n            state.dailySnapshots.put(LocalDate.parse(NbtCompat.getString(snapshot, "date")), readPlayers(snapshot));\n        }}'''
              new_load = f'''        if (Integer.toString(HISTORY_SCHEMA).equals(NbtCompat.getString(nbt, "historySchema"))) {{\n            for ({tag} element : NbtCompat.getList(nbt, "periods", {compound_type})) {{\n                PeriodData data = PeriodData.fromNbt(({compound}) element);\n                state.periods.put(data.period, data);\n            }}\n            for ({tag} element : NbtCompat.getList(nbt, "dailySnapshots", {compound_type})) {{\n                {compound} snapshot = ({compound}) element;\n                state.dailySnapshots.put(LocalDate.parse(NbtCompat.getString(snapshot, "date")), readPlayers(snapshot));\n            }}\n            for ({tag} element : NbtCompat.getList(nbt, "partialSnapshotDates", {string_type})) {{\n                try {{ state.partialSnapshotDates.add(LocalDate.parse(NbtCompat.asString(element))); }}\n                catch (RuntimeException ignored) {{ }}\n            }}\n        }} else {{\n            RankBoardMod.LOGGER.warn("Discarding legacy RankBoard date baselines because their history schema is not trustworthy");\n        }}'''
              text = replace_once(text, old_load, new_load, f'{path} schema load')

              text = replace_once(text,
                  '        NbtList list = new NbtList();\n' if not mojmap else '        ListTag list = new ListTag();\n',
                  ('        nbt.putString("historySchema", Integer.toString(HISTORY_SCHEMA));\n'
                   + ('        ListTag list = new ListTag();\n' if mojmap else '        NbtList list = new NbtList();\n')),
                  f'{path} schema write')

              after_snapshots = '        nbt.put("dailySnapshots", snapshots);\n'
              partial_write = (('        ListTag partialDates = new ListTag();\n'
                                '        partialSnapshotDates.forEach(date -> partialDates.add(StringTag.valueOf(date.toString())));\n') if mojmap else
                               ('        NbtList partialDates = new NbtList();\n'
                                '        partialSnapshotDates.forEach(date -> partialDates.add(NbtString.of(date.toString())));\n'))
              partial_write += '        nbt.put("partialSnapshotDates", partialDates);\n'
              text = replace_once(text, after_snapshots, after_snapshots + partial_write, f'{path} partial write')

              old_daily = '''        if (!dailySnapshots.containsKey(now)) {\n            Map<UUID, Map<RankBoardMod.Metric, Long>> values = new HashMap<>();\n            snapshots.forEach(snapshot -> values.put(snapshot.uuid(), new EnumMap<>(snapshot.values())));\n            dailySnapshots.put(now, values);\n            changed = true;\n        }\n        if (backfillMissingMetrics(snapshots)) changed = true;'''
              new_daily = '''        if (!dailySnapshots.containsKey(now)) {\n            Map<UUID, Map<RankBoardMod.Metric, Long>> values = new HashMap<>();\n            snapshots.forEach(snapshot -> values.put(snapshot.uuid(), new EnumMap<>(snapshot.values())));\n            dailySnapshots.put(now, values);\n            if (LocalTime.now().isAfter(COMPLETE_BOUNDARY_LIMIT)) partialSnapshotDates.add(now);\n            else partialSnapshotDates.remove(now);\n            changed = true;\n        }'''
              text = replace_once(text, old_daily, new_daily, f'{path} immutable daily snapshots')

              text = replace_regex(text,
                  r'\n    private boolean backfillMissingMetrics\(List<StatSnapshot> snapshots\) \{.*?\n    \}\n    public void ensurePlayer',
                  '\n    public void ensurePlayer',
                  f'{path} remove backfill')

              range_method = '''    public RangeData range(MinecraftServer server, LocalDate from, LocalDate to, RankBoardMod.Metric metric) {\n        if (!StatReader.isReady()) {\n            throw new IllegalStateException("历史统计缓存仍在加载（" + StatReader.progress() + "），请稍后再查询日期范围。");\n        }\n        if (to.isBefore(from)) throw new IllegalArgumentException("结束日期不能早于开始日期");\n        Map<UUID, Map<RankBoardMod.Metric, Long>> start = dailySnapshots.get(from);\n        if (start == null) {\n            throw new IllegalArgumentException("开始日期没有真实边界快照；最早可完整查询日期为 " + earliestSnapshotDate());\n        }\n        if (partialSnapshotDates.contains(from)) {\n            throw new IllegalArgumentException("开始日期 " + from + " 的快照是在当天启动后补建的，不是零点边界，不能用于精确统计");\n        }\n        Map<UUID, Long> endValues = new HashMap<>();\n        LocalDate today = LocalDate.now();\n        LocalDate endBoundary;\n        if (!to.isBefore(today)) {\n            endBoundary = today;\n            StatReader.readAll(server, metric).forEach(snapshot -> endValues.put(snapshot.uuid(), snapshot.value(metric)));\n        } else {\n            LocalDate requiredEnd = to.plusDays(1);\n            Map<UUID, Map<RankBoardMod.Metric, Long>> end = dailySnapshots.get(requiredEnd);\n            if (end == null) throw new IllegalArgumentException("结束日期缺少次日零点快照：" + requiredEnd);\n            if (partialSnapshotDates.contains(requiredEnd)) {\n                throw new IllegalArgumentException("结束边界 " + requiredEnd + " 不是零点建立的完整快照");\n            }\n            endBoundary = requiredEnd;\n            end.forEach((uuid, values) -> endValues.put(uuid, values.getOrDefault(metric, 0L)));\n        }\n        Map<UUID, Long> result = new HashMap<>();\n        int missingBaseline = 0;\n        int resetCounters = 0;\n        for (Map.Entry<UUID, Long> entry : endValues.entrySet()) {\n            Map<RankBoardMod.Metric, Long> startValues = start.get(entry.getKey());\n            if (startValues == null || !startValues.containsKey(metric)) {\n                missingBaseline++;\n                continue;\n            }\n            long base = startValues.get(metric);\n            if (entry.getValue() < base) {\n                resetCounters++;\n                continue;\n            }\n            result.put(entry.getKey(), entry.getValue() - base);\n        }\n        List<String> warnings = new java.util.ArrayList<>();\n        if (missingBaseline > 0) warnings.add(missingBaseline + " 名玩家缺少开始边界，已从结果排除");\n        if (resetCounters > 0) warnings.add(resetCounters + " 名玩家的累计统计发生回退，已从结果排除");\n        return new RangeData(from, endBoundary, result, warnings.isEmpty(), List.copyOf(warnings));\n    }\n\n'''
              text = replace_regex(text,
                  r'    public RangeData range\(MinecraftServer server, LocalDate from, LocalDate to, RankBoardMod.Metric metric\) \{.*?\n    \}\n\n    public String earliestSnapshotDate',
                  range_method + '    public String earliestSnapshotDate',
                  f'{path} strict range')

              text = replace_regex(text,
                  r'    public String earliestSnapshotDate\(\) \{.*?\n    \}',
                  '''    public String earliestSnapshotDate() {\n        for (LocalDate date : dailySnapshots.navigableKeySet()) {\n            if (!partialSnapshotDates.contains(date)) return date.toString();\n        }\n        return "暂无完整零点快照";\n    }''',
                  f'{path} earliest complete snapshot')
              text = replace_once(text,
                  '    public record RangeData(LocalDate actualStart, LocalDate actualEnd, Map<UUID, Long> values) { }',
                  '    public record RangeData(LocalDate actualStart, LocalDate actualEnd, Map<UUID, Long> values,\n'
                  '                            boolean complete, List<String> warnings) { }',
                  f'{path} range record')
              write(path, text)

          def patch_mod(path, mojmap):
              text = read(path)
              text = replace_once(text, '            BoardService.restoreGlobal(server);\n', '', f'{path} defer global restore')
              if mojmap:
                  old = '        ServerPlayConnectionEvents.DISCONNECT.register((handler, server) -> {\n            StatReader.reloadPlayer(server, handler.getPlayer().getUUID());\n'
                  new = '        ServerPlayConnectionEvents.DISCONNECT.register((handler, server) -> {\n            StatReader.capturePlayer(server, handler.getPlayer());\n            StatReader.reloadPlayer(server, handler.getPlayer().getUUID());\n'
              else:
                  old = '        ServerPlayConnectionEvents.DISCONNECT.register((handler, server) -> {\n            StatReader.reloadPlayer(server, handler.getPlayer().getUuid());\n'
                  new = '        ServerPlayConnectionEvents.DISCONNECT.register((handler, server) -> {\n            StatReader.capturePlayer(server, handler.getPlayer());\n            StatReader.reloadPlayer(server, handler.getPlayer().getUuid());\n'
              text = replace_once(text, old, new, f'{path} disconnect capture')
              text = replace_once(text,
                  '    static List<Entry> entries(net.minecraft.server.MinecraftServer server, Period period, Metric metric) {\n        LeaderboardState state = LeaderboardState.get(server);\n',
                  '    static List<Entry> entries(net.minecraft.server.MinecraftServer server, Period period, Metric metric) {\n'
                  '        if (!StatReader.isReady()) {\n'
                  '            throw new IllegalStateException("统计文件尚未完成权威扫描（" + StatReader.progress() + "）");\n'
                  '        }\n'
                  '        LeaderboardState state = LeaderboardState.get(server);\n',
                  f'{path} block partial totals')
              text = replace_once(text,
                  'date.getYear() + "-W" + date.get(WeekFields.ISO.weekOfWeekBasedYear())',
                  'date.get(WeekFields.ISO.weekBasedYear()) + "-W" + date.get(WeekFields.ISO.weekOfWeekBasedYear())',
                  f'{path} ISO week year')
              write(path, text)

          def patch_web(path):
              text = read(path)
              text = replace_once(text,
                  '        if (!period.equals("all") && !StatReader.isReady()) {\n            throw new IllegalStateException("历史统计缓存仍在加载（" + StatReader.progress() + "），日期范围榜将在加载完成后可用。");\n        }',
                  '        if (!StatReader.isReady()) {\n            throw new IllegalStateException("统计文件仍在进行权威扫描（" + StatReader.progress() + "），总榜和日期范围榜暂不可用。");\n        }',
                  f'{path} authoritative web readiness')
              text = replace_once(text,
                  '        String actualStart;\n        String actualEnd;\n',
                  '        String actualStart;\n        String actualEnd;\n        boolean complete = true;\n        List<String> warnings = List.of();\n',
                  f'{path} range metadata vars')
              text = replace_once(text,
                  '            LeaderboardState.RangeData range = state.range(server, from, to, metric);\n',
                  '            LeaderboardState.RangeData range = state.range(server, from, to, metric);\n'
                  '            complete = range.complete();\n'
                  '            warnings = range.warnings();\n',
                  f'{path} range metadata assignment')
              text = replace_once(text,
                  '        root.addProperty("earliest", state.earliestSnapshotDate());\n',
                  '        root.addProperty("earliest", state.earliestSnapshotDate());\n'
                  '        root.addProperty("complete", complete);\n'
                  '        JsonArray warningArray = new JsonArray();\n'
                  '        warnings.forEach(warningArray::add);\n'
                  '        root.add("warnings", warningArray);\n',
                  f'{path} range metadata json')
              write(path, text)

          patch_stat_reader('src/main/java/cn/bamgdam/rankboard/StatReader.java', False)
          patch_stat_reader('src/mojmap/java/cn/bamgdam/rankboard/StatReader.java', True)
          patch_state('src/main/java/cn/bamgdam/rankboard/LeaderboardState.java', False)
          patch_state('src/mojmap/java/cn/bamgdam/rankboard/LeaderboardState.java', True)
          patch_mod('src/main/java/cn/bamgdam/rankboard/RankBoardMod.java', False)
          patch_mod('src/mojmap/java/cn/bamgdam/rankboard/RankBoardMod.java', True)
          patch_web('src/main/java/cn/bamgdam/rankboard/WebDashboard.java')
          patch_web('src/mojmap/java/cn/bamgdam/rankboard/WebDashboard.java')

          app = read('web/src/App.tsx')
          app = replace_once(app,
              '  earliest?: string;\n};',
              '  earliest?: string;\n  complete?: boolean;\n  warnings?: string[];\n};',
              'frontend response metadata')
          app = replace_once(app,
              '              <p className="eyebrow">{period === "custom" && ranking ? `${ranking.from} 至 ${ranking.to}` : periods.find((item) => item.id === period)?.label}</p>',
              '              <p className="eyebrow">{period === "custom" && ranking ? `${ranking.actualStart ?? ranking.from} 至 ${ranking.actualEnd ?? ranking.to}` : periods.find((item) => item.id === period)?.label}</p>',
              'frontend actual boundaries')
          app = replace_once(app,
              '          {error && <div className="notice error glass">{error}</div>}\n',
              '          {error && <div className="notice error glass">{error}</div>}\n'
              '          {!error && ranking?.complete === false && (\n'
              '            <div className="notice error glass">\n'
              '              该范围不是完整统计：{ranking.warnings?.join("；") || "部分玩家数据已被排除"}\n'
              '            </div>\n'
              '          )}\n',
              'frontend warnings')
          write('web/src/App.tsx', app)

          gradle = read('gradle.properties')
          gradle = replace_once(gradle, 'mod_version=1.5.5', 'mod_version=1.5.6', 'version bump')
          write('gradle.properties', gradle)

          readme = read('README.md')
          readme = replace_once(readme, '当前版本：`1.5.5`', '当前版本：`1.5.6`', 'README version')
          marker = '### 安装\n'
          note = '''### 1.5.6 数据正确性说明\n\n- 总榜在所有 `world/stats/*.json` 完成权威扫描前不会返回结果，避免旧缓存和部分玩家数据混合。\n- 挖掘统计的在线与离线读取统一为当前注册方块集合，排除已删除模组留下的失效统计 ID。\n- 玩家退出时先保存内存中的最新统计，再异步核对磁盘文件，减少退出瞬间的落后值。\n- 日期快照升级为 schema 2；旧版本可能被反向补值污染的周期和日期基线会被自动废弃。\n- 日期范围必须存在准确的开始日期和结束次日零点快照；服务器错过零点或当天启动后补建的快照会明确拒绝查询。\n- 新玩家缺少开始基线、或原版累计计数发生回退时，该玩家会从范围结果排除并返回警告，不再按 0 基线制造巨额数据。\n- 升级当天通常会标记为不完整；服务器持续运行并跨过下一个零点后，才开始产生可精确查询的新历史。\n\n'''
          readme = replace_once(readme, marker, note + marker, 'README correctness note')
          write('README.md', readme)

          for path in [
              'src/main/java/cn/bamgdam/rankboard/LeaderboardState.java',
              'src/mojmap/java/cn/bamgdam/rankboard/LeaderboardState.java',
          ]:
              content = read(path)
              if 'backfillMissingMetrics' in content:
                  raise SystemExit(f'{path}: legacy backfill still present')
              if 'ceilingEntry(' in content:
                  raise SystemExit(f'{path}: approximate date boundary still present')
          PY

      - name: Check patch
        run: |
          git diff --check
          grep -R "PERSISTENT_CACHE_SCHEMA = 5" src/main/java src/mojmap/java
          grep -R "HISTORY_SCHEMA = 2" src/main/java src/mojmap/java
          grep -R "case MINED -> sumMatching" src/main/java src/mojmap/java

      - name: Build current target
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Commit corrected source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md gradle.properties src web/src/App.tsx
          git commit -m "Fix leaderboard data correctness"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
