name: Build RankBoard

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build
        run: ./gradlew clean build --stacktrace

      - name: Collect JARs
        run: |
          mkdir -p artifact
          find build mod-builds multi-version-builds -type f -name '*.jar' \
            ! -name '*-sources.jar' \
            -exec cp {} artifact/ \; 2>/dev/null || true
          test -n "$(find artifact -maxdepth 1 -type f -name '*.jar' -print -quit)"
          sha256sum artifact/*.jar > artifact/SHA256SUMS.txt

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: rankboard-1.5.2-mc1.21.1
          path: artifact/
          if-no-files-found: error
