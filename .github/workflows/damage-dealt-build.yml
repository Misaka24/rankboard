name: Damage Dealt Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/add-damage-dealt-leaderboard
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Apply source patch
        id: patch
        continue-on-error: true
        run: |
          python .github/patches/add_damage_dealt.py > patch-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload patch diagnostics
        if: steps.patch.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: damage-dealt-patch-diagnostics
          path: patch-output.txt

      - name: Stop after patch failure
        if: steps.patch.outputs.exit_code != '0'
        run: |
          cat patch-output.txt
          exit 1

      - name: Commit real source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md gradle.properties web/src/App.tsx src/main/java src/mojmap/java
          if git diff --cached --quiet; then
            echo "No source changes to commit"
          else
            git commit -m "Add damage dealt leaderboard"
            git push origin HEAD:agent/add-damage-dealt-leaderboard
          fi

      - name: Build
        id: build
        continue-on-error: true
        run: |
          ./gradlew clean build --stacktrace > build-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload build diagnostics
        if: steps.build.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: damage-dealt-build-diagnostics
          path: build-output.txt

      - name: Stop after build failure
        if: steps.build.outputs.exit_code != '0'
        run: |
          tail -n 200 build-output.txt
          exit 1

      - name: Collect production JAR
        run: |
          mkdir -p artifact
          find build mod-builds multi-version-builds -type f -name '*.jar' \
            ! -name '*-sources.jar' \
            -exec cp {} artifact/ \; 2>/dev/null || true
          find artifact -maxdepth 1 -type f -name '*.jar' -print
          test -n "$(find artifact -maxdepth 1 -type f -name '*.jar' -print -quit)"
          sha256sum artifact/*.jar > artifact/SHA256SUMS.txt

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: rankboard-1.5.2-mc1.21.1
          path: artifact/
          if-no-files-found: error
