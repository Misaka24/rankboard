name: Inspect original multi-version release

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/multiversion-trigger'

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect fork release assets and repository tree
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u
          {
            echo '=== FORK RELEASES ==='
            gh api repos/Misaka24/rankboard/releases --jq '.[] | [.tag_name, (.assets[].name // "NO_ASSET")] | @tsv' || true
            echo '=== RELEVANT TREE FILES ==='
            gh api 'repos/Misaka24/rankboard/git/trees/bcbd544c86635b59fcaa3b6f5c05f3f67f64d548?recursive=1' --jq '.tree[].path' | grep -Ei 'version|build|gradle|release|properties|workflow' || true
            echo '=== RELEVANT FILE CONTENTS ==='
            for p in $(gh api 'repos/Misaka24/rankboard/git/trees/bcbd544c86635b59fcaa3b6f5c05f3f67f64d548?recursive=1' --jq '.tree[].path' | grep -Ei '(^|/)(build|release|version).*(sh|bat|ps1|yml|yaml|properties)$|gradle.properties|build.gradle' || true); do
              echo "--- $p ---"
              gh api "repos/Misaka24/rankboard/contents/$p?ref=bcbd544c86635b59fcaa3b6f5c05f3f67f64d548" --jq '.content' | base64 -d || true
              echo
            done
          } | tee inspect-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: rankboard-multiversion-inspection
          path: inspect-output.txt
