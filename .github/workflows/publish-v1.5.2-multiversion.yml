name: Publish RankBoard 1.5.2 Multi-Version

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/release-multiversion-trigger'

permissions:
  actions: write
  contents: write

jobs:
  publish:
    if: github.repository == 'Misaka24/rankboard'
    runs-on: ubuntu-latest
    steps:
      - name: Check out clean source commit
        uses: actions/checkout@v4
        with:
          ref: b9dfdc6e1d079bfc5fd5be0de6515555fc858993

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build three release targets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files wrapper/META-INF/jars wrapper-root

          build_121() {
            local name="$1" mc="$2" mappings="$3" fabric="$4" range="$5"
            ./gradlew clean build --no-daemon --stacktrace \
              -Pminecraft_version="$mc" \
              -Pmapping_type=yarn \
              -Pyarn_mappings="$mappings" \
              -Pminecraft_dependency="$range" \
              -Ploader_version=0.15.11 \
              -Pfabric_version="$fabric"
            local jar
            jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
            test -n "$jar"
            cp "$jar" "wrapper/META-INF/jars/rankboard-mc${name}-1.5.2.jar"
          }

          build_121 '1.21' '1.21' '1.21+build.9' '0.102.0+1.21' '>=1.21 <1.21.5'
          build_121 '1.21.5' '1.21.5' '1.21.5+build.1' '0.128.2+1.21.5' '>=1.21.5 <1.21.10'
          build_121 '1.21.10' '1.21.10' '1.21.10+build.3' '0.138.4+1.21.10' '>=1.21.10 <1.21.11'
          build_121 '1.21.11' '1.21.11' '1.21.11+build.6' '0.141.5+1.21.11' '>=1.21.11 <1.22'

          cp LICENSE wrapper-root/LICENSE
          cp -r wrapper/META-INF wrapper-root/META-INF
          cat > wrapper-root/fabric.mod.json <<'JSON'
          {
            "schemaVersion": 1,
            "id": "rankboard_wrapper",
            "version": "1.5.2+mc1.21.x",
            "name": "RankBoard 1.21.x Wrapper",
            "description": "Selects the compatible RankBoard build for Minecraft 1.21.x.",
            "environment": "*",
            "entrypoints": {},
            "depends": {
              "fabricloader": ">=0.15.11",
              "minecraft": ">=1.21 <1.22",
              "java": ">=21"
            },
            "jars": [
              {"file":"META-INF/jars/rankboard-mc1.21-1.5.2.jar"},
              {"file":"META-INF/jars/rankboard-mc1.21.5-1.5.2.jar"},
              {"file":"META-INF/jars/rankboard-mc1.21.10-1.5.2.jar"},
              {"file":"META-INF/jars/rankboard-mc1.21.11-1.5.2.jar"}
            ]
          }
          JSON
          (cd wrapper-root && zip -qr ../release-files/rankboard-1.5.2+mc1.21.x.jar .)

          get_fabric_api() {
            python - "$1" <<'PY'
          import sys, urllib.request, xml.etree.ElementTree as ET
          target = '+' + sys.argv[1]
          data = urllib.request.urlopen('https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/maven-metadata.xml').read()
          versions = [e.text for e in ET.fromstring(data).findall('.//version') if e.text and e.text.endswith(target)]
          if not versions:
              raise SystemExit('No Fabric API version found for ' + sys.argv[1])
          print(versions[-1])
          PY
          }

          build_26() {
            local mc="$1" range="$2" label="$3"
            local fabric
            fabric="$(get_fabric_api "$mc")"
            ./gradlew clean build --no-daemon --stacktrace \
              -Pminecraft_version="$mc" \
              -Pmapping_type=official \
              -Pminecraft_dependency="$range" \
              -Ploader_version=0.18.6 \
              -Pfabric_version="$fabric"
            local jar
            jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
            test -n "$jar"
            cp "$jar" "release-files/rankboard-1.5.2+mc${label}.jar"
          }

          build_26 '26.1.2' '>=26.1 <26.2' '26.1.x'
          build_26 '26.2' '>=26.2 <26.3' '26.2.x'

          (cd release-files && sha256sum *.jar > SHA256SUMS.txt)
          ls -lh release-files

      - name: Upload Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: rankboard-1.5.2-three-minecraft-targets
          path: release-files/*
          if-no-files-found: error

      - name: Replace GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete v1.5.2 --yes --cleanup-tag || true
          gh release create v1.5.2 release-files/* \
            --target b9dfdc6e1d079bfc5fd5be0de6515555fc858993 \
            --title 'RankBoard 1.5.2' \
            --notes $'## RankBoard 1.5.2\n\nMinecraft targets:\n- 1.21.x universal wrapper (1.21, 1.21.5, 1.21.10, 1.21.11)\n- 26.1.x (built against 26.1.2)\n- 26.2.x (built against 26.2)\n\nFeature: added damage dealt leaderboard (`dealt`) with online/offline statistics, UI, labels, colors and cache migration.'

      - name: Delete old Actions runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" --jq '.workflow_runs[].id' |
          while read -r run_id; do
            if [ "$run_id" != "$GITHUB_RUN_ID" ]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" || true
            fi
          done

      - name: Delete temporary trigger branch
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/release-v1.5.2-multiversion-trigger" || true
