name: Decompile upstream RankBoard 1.5.4

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/decompile-upstream-1.5.4-trigger'

permissions:
  contents: read

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out upstream main baseline
        uses: actions/checkout@v4
        with:
          repository: halfkite/rankboard
          ref: main
          path: upstream-main
          fetch-depth: 1

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download release assets and CFR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work/assets work/jars work/decompiled work/diff
          gh api repos/halfkite/rankboard/releases/tags/1.5.4 > work/release.json
          jq -r '.assets[] | [.id,.name] | @tsv' work/release.json |
          while IFS=$'\t' read -r id name; do
            gh api "repos/halfkite/rankboard/releases/assets/$id" -H 'Accept: application/octet-stream' > "work/assets/$name"
          done
          curl -fsSL https://www.benf.org/other/cfr/cfr-0.152.jar -o work/cfr.jar
          unzip -p work/assets/rankboard-1.5.4+mc1.21.x+2607200935.jar META-INF/jars/rankboard-mc1.21.11-1.5.4.jar > work/jars/rankboard-1.5.4-mc1.21.11.jar

      - name: Build upstream main 26.1 baseline
        shell: bash
        working-directory: upstream-main
        run: |
          set -euo pipefail
          fabric=$(python - <<'PY'
          import urllib.request, xml.etree.ElementTree as ET
          root=ET.fromstring(urllib.request.urlopen('https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/maven-metadata.xml').read())
          versions=[e.text for e in root.findall('.//version') if e.text and e.text.endswith('+26.1.2')]
          if not versions: raise SystemExit('No Fabric API for 26.1.2')
          print(versions[-1])
          PY
          )
          chmod +x gradlew
          ./gradlew clean build --no-daemon --stacktrace \
            -Pminecraft_version=26.1.2 \
            -Pmapping_type=none \
            -Pminecraft_dependency='>=26.1 <26.2' \
            -Ploader_version=0.18.6 \
            -Pfabric_version="$fabric"
          jar=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n1)
          test -n "$jar"
          cp "$jar" ../work/jars/upstream-main-mc26.1.jar

      - name: Compare class hashes and decompile
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json, zipfile
          base='work/jars/upstream-main-mc26.1.jar'
          rel='work/assets/rankboard-1.5.4+mc26.1.x.jar'
          def hashes(path):
              with zipfile.ZipFile(path) as z:
                  return {n:hashlib.sha256(z.read(n)).hexdigest() for n in z.namelist() if n.endswith('.class')}
          a,b=hashes(base),hashes(rel)
          names=sorted(set(a)|set(b))
          changed=[{'class':n,'baseline':a.get(n),'release':b.get(n)} for n in names if a.get(n)!=b.get(n)]
          json.dump(changed,open('work/diff/changed-classes.json','w'),indent=2)
          open('work/diff/changed-classes.txt','w').write('\n'.join(x['class'] for x in changed)+'\n')
          PY

          for jar in work/jars/upstream-main-mc26.1.jar work/assets/rankboard-1.5.4+mc26.1.x.jar work/jars/rankboard-1.5.4-mc1.21.11.jar; do
            label=$(basename "$jar" .jar)
            java -jar work/cfr.jar "$jar" --outputdir "work/decompiled/$label" --silent true
          done

          mkdir -p work/relevant
          for root in work/decompiled/*; do
            label=$(basename "$root")
            mkdir -p "work/relevant/$label"
            for f in RankBoardMod.java RankBoardConfig.java BoardService.java LeaderboardState.java WebDashboard.java; do
              find "$root" -type f -name "$f" -exec cp {} "work/relevant/$label/$f" \;
            done
          done

          base=work/decompiled/upstream-main-mc26.1/cn/bamgdam/rankboard
          rel=work/decompiled/rankboard-1.5.4+mc26.1.x/cn/bamgdam/rankboard
          for f in RankBoardMod.java RankBoardConfig.java BoardService.java LeaderboardState.java WebDashboard.java; do
            diff -u "$base/$f" "$rel/$f" > "work/diff/$f.diff" || true
          done
          cat work/diff/changed-classes.txt

      - uses: actions/upload-artifact@v4
        with:
          name: upstream-rankboard-1.5.4-decompiled
          path: |
            work/relevant
            work/diff
            work/release.json
