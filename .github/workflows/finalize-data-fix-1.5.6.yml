name: Finalize RankBoard 1.5.6 data fix

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write

jobs:
  patch-and-build:
    if: github.head_ref == 'finalize-data-fix-1.5.6'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply final period fixes
        run: |
          python3 tools/patch_period_state_1_5_6.py
          python3 tools/patch_period_usage_1_5_6.py
          git diff --check
      - name: Build current target
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace
      - name: Commit final source only
        run: |
          rm -f tools/patch_period_state_1_5_6.py tools/patch_period_usage_1_5_6.py
          rm -f .github/workflows/finalize-data-fix-1.5.6.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Enforce complete period boundaries"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
