name: Publish corrected merged RankBoard 1.5.5

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/final-1.5.5-r2-trigger'

permissions:
  contents: write

jobs:
  publish:
    if: github.repository == 'Misaka24/rankboard'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository control branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Create clean merged source commit
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/rankboard-1.5.5.patch.gz.b64 | gzip -d > /tmp/rankboard.patch
          git checkout --detach b9dfdc6e1d079bfc5fd5be0de6515555fc858993
          git apply --check /tmp/rankboard.patch
          git apply /tmp/rankboard.patch
          python - <<'PYFIX'
          from pathlib import Path
          path=Path('src/main/java/cn/bamgdam/rankboard/BoardService.java')
          text=path.read_text()
          old='? RankBoardColors.colorValue(Formatting.AQUA)'
          new='? (Formatting.AQUA.getColorValue() == null ? 0x55FFFF : Formatting.AQUA.getColorValue())'
          if old not in text:
              raise SystemExit('Expected Yarn color helper call was not found')
          path.write_text(text.replace(old,new,1))
          PYFIX
          grep -q '^mod_version=1.5.5$' gradle.properties
          grep -q 'DAMAGE_DEALT' src/main/java/cn/bamgdam/rankboard/RankBoardMod.java
          grep -q 'carousel-color-follow-metric' src/main/java/cn/bamgdam/rankboard/RankBoardConfig.java
          grep -q 'website-button-enabled' src/main/java/cn/bamgdam/rankboard/RankBoardConfig.java
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git checkout -B sync-upstream-1.5.4-release
          git add README.md gradle.properties src/main src/mojmap
          git commit -m 'Merge upstream 1.5.4 release features'
          git push --force origin HEAD:sync-upstream-1.5.4-release
          echo "MERGED_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Build three Minecraft release targets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files wrapper/META-INF/jars wrapper-root

          build_121() {
            local name="$1" mc="$2" mappings="$3" fabric="$4" range="$5"
            ./gradlew clean build --no-daemon --stacktrace \
              -Pminecraft_version="$mc" -Pmapping_type=yarn \
              -Pyarn_mappings="$mappings" -Pminecraft_dependency="$range" \
              -Ploader_version=0.15.11 -Pfabric_version="$fabric"
            local jar
            jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
            test -n "$jar"
            cp "$jar" "wrapper/META-INF/jars/rankboard-mc${name}-1.5.5.jar"
          }

          build_121 '1.21' '1.21' '1.21+build.9' '0.102.0+1.21' '>=1.21 <1.21.5'
          build_121 '1.21.5' '1.21.5' '1.21.5+build.1' '0.128.2+1.21.5' '>=1.21.5 <1.21.10'
          build_121 '1.21.10' '1.21.10' '1.21.10+build.3' '0.138.4+1.21.10' '>=1.21.10 <1.21.11'
          build_121 '1.21.11' '1.21.11' '1.21.11+build.6' '0.141.5+1.21.11' '>=1.21.11 <1.22'

          cp LICENSE wrapper-root/LICENSE
          cp -r wrapper/META-INF wrapper-root/META-INF
          python - <<'PYWRAP'
          import json, os, zipfile
          root='wrapper-root'
          manifest={
            'schemaVersion':1,'id':'rankboard_wrapper','version':'1.5.5+mc1.21.x',
            'name':'RankBoard 1.21.x Wrapper',
            'description':'Selects the compatible RankBoard build for Minecraft 1.21.x.',
            'environment':'*','entrypoints':{},
            'depends':{'fabricloader':'>=0.15.11','minecraft':'>=1.21 <1.22','java':'>=21'},
            'jars':[{'file':f'META-INF/jars/rankboard-mc{v}-1.5.5.jar'} for v in ('1.21','1.21.5','1.21.10','1.21.11')]
          }
          with open(os.path.join(root,'fabric.mod.json'),'w',encoding='utf-8') as f:
              json.dump(manifest,f,ensure_ascii=False,indent=2)
          out='release-files/rankboard-1.5.5+mc1.21.x.jar'
          with zipfile.ZipFile(out,'w',zipfile.ZIP_DEFLATED) as z:
              for base,_,files in os.walk(root):
                  for name in files:
                      p=os.path.join(base,name)
                      z.write(p,os.path.relpath(p,root).replace(os.sep,'/'))
          PYWRAP

          get_fabric_api() {
            python - "$1" <<'PYFABRIC'
          import sys, urllib.request, xml.etree.ElementTree as ET
          target='+'+sys.argv[1]
          root=ET.fromstring(urllib.request.urlopen('https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/maven-metadata.xml').read())
          versions=[e.text for e in root.findall('.//version') if e.text and e.text.endswith(target)]
          if not versions: raise SystemExit('No Fabric API version found for '+sys.argv[1])
          print(versions[-1])
          PYFABRIC
          }

          build_26() {
            local mc="$1" range="$2" label="$3" fabric
            fabric="$(get_fabric_api "$mc")"
            ./gradlew clean build --no-daemon --stacktrace \
              -Pminecraft_version="$mc" -Pmapping_type=none \
              -Pminecraft_dependency="$range" -Ploader_version=0.18.6 \
              -Pfabric_version="$fabric"
            local jar
            jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
            test -n "$jar"
            cp "$jar" "release-files/rankboard-1.5.5+mc${label}.jar"
          }

          build_26 '26.1.2' '>=26.1 <26.2' '26.1.x'
          build_26 '26.2' '>=26.2 <26.3' '26.2.x'

      - name: Verify release artifacts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYVERIFY'
          import io, json, os, zipfile
          required=(b'DAMAGE_DEALT', b'carousel-color-follow-metric', b'website-button-enabled')
          files=[os.path.join('release-files',n) for n in os.listdir('release-files') if n.endswith('.jar')]
          assert len(files)==3, files
          def verify_implementation(data, label):
              with zipfile.ZipFile(io.BytesIO(data)) as z:
                  classes=b''.join(z.read(n) for n in z.namelist() if n.endswith('.class'))
                  for needle in required:
                      assert needle in classes, (label,needle)
                  manifest=json.loads(z.read('fabric.mod.json'))
                  assert str(manifest['version']).startswith('1.5.5+mc'), (label,manifest['version'])
          for path in files:
              data=open(path,'rb').read()
              with zipfile.ZipFile(io.BytesIO(data)) as z:
                  nested=[n for n in z.namelist() if n.startswith('META-INF/jars/') and n.endswith('.jar')]
                  if nested:
                      assert len(nested)==4, (path,nested)
                      for n in nested: verify_implementation(z.read(n), path+'!'+n)
                  else:
                      verify_implementation(data,path)
          PYVERIFY
          (cd release-files && sha256sum *.jar > SHA256SUMS.txt)
          ls -lh release-files
          cat release-files/SHA256SUMS.txt

      - name: Upload Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: rankboard-1.5.5-three-minecraft-targets
          path: release-files/*
          if-no-files-found: error

      - name: Publish GitHub Release 1.5.5
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete 1.5.5 --yes --cleanup-tag || true
          gh release create 1.5.5 release-files/* \
            --target "$MERGED_SHA" \
            --title 'RankBoard 1.5.5' \
            --notes $'## RankBoard 1.5.5\n\n同步上游 Release 1.5.4 的实际 JAR 功能，并合并造成伤害榜单。\n\n### 上游 1.5.4 功能\n- 调整排行榜菜单顺序\n- 轮播榜标题颜色可跟随榜单或固定为青色\n- `/leaderboard help` 中指令与说明使用不同颜色\n- 增加网站按钮显示开关及配套配置\n\n### Fork 新功能\n- 增加造成伤害榜单 `dealt`，支持在线、离线统计、网页、颜色、标签和缓存迁移\n\n### Minecraft 适配\n- 1.21.x 通用包（1.21、1.21.5、1.21.10、1.21.11）\n- 26.1.x（基于 26.1.2 构建）\n- 26.2.x（基于 26.2 构建）'
